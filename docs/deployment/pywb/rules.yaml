default_filters:
  fuzzy_search_limit: "100"

  not_exts:
    - asp
    - aspx
    - jsp
    - php
    - pl
    - exe
    - dll

  mimes:
    - application/x-shockwave-flash
    - application/dash+xml
    - application/x-mpegURL
    - application/vnd.apple.mpegurl

  url_normalize:
    - match: "[?&](_|cb|uncache)=([\\d]+)(?=&|$)"
      replace: ""
    - match: "[?&]utm_[^=]+=[^&]+(?=&|$)"
      replace: ""
    - match: "[?&](callback=jsonp)[^&]+(?=&|$)"
      replace: "\\1"
    - match: "[?&]((?:\\w+)=jquery)[\\d]+_[\\d]+"
      replace: "\\1"
    - match: "[?&](\\w*(bust|ts)\\w*=1[\\d]{12,15})(?=&|$)"
      replace: ""
    - match: "[?&](fbclid)=(.*)+(?=&|$)"
      replace: ""

rules:
  # Keep pywb's generic fuzzy fallback so replay lookup still has a sane
  # default behavior even without the full upstream ruleset.
  - url_prefix: ""
    fuzzy_lookup:
      match: "()"

  # Public replay does not need archived Set-Cookie headers. Dropping them at
  # pywb avoids malformed upstream cookie lines (for example AWSALBCORS
  # continuations) from breaking Caddy's HTTP parser and surfacing as 502s.
  - url_prefix: ""
    rewrite:
      cookie_scope: removeall
