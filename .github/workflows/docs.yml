name: Deploy Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

concurrency:
  group: healtharchive-backend-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout backend
        uses: actions/checkout@v6
        with:
          path: healtharchive-backend
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: healtharchive-backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"

      - name: Generate API and assistant context
        working-directory: healtharchive-backend
        run: |
          PYTHONPATH=src python3 scripts/export_openapi.py
          python3 scripts/generate_llms_txt.py

      - name: Build Documentation
        working-directory: healtharchive-backend
        run: make docs-build

      - name: Docs references (advisory)
        working-directory: healtharchive-backend
        continue-on-error: true
        run: make docs-refs

      - name: Docs coverage (advisory)
        working-directory: healtharchive-backend
        continue-on-error: true
        run: make docs-coverage

      - name: Lychee Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --exclude-mail "healtharchive-backend/site/**/*.html"
          fail: false # Set to true if you want to block on dead links

      - name: Publish site to gh-pages
        working-directory: healtharchive-backend
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          publish_dir="$(mktemp -d)"

          if git clone --branch gh-pages --single-branch "${repo_url}" "${publish_dir}" >/dev/null 2>&1; then
            :
          else
            git init "${publish_dir}" >/dev/null 2>&1
            git -C "${publish_dir}" checkout --orphan gh-pages
          fi

          find "${publish_dir}" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -a site/. "${publish_dir}/"
          touch "${publish_dir}/.nojekyll"

          git -C "${publish_dir}" config user.name "${GITHUB_ACTOR}"
          git -C "${publish_dir}" config user.email "${GITHUB_ACTOR}@users.noreply.github.com"
          git -C "${publish_dir}" add --all

          if git -C "${publish_dir}" diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git -C "${publish_dir}" commit -m "docs: publish ${GITHUB_SHA}"
          git -C "${publish_dir}" push "${repo_url}" gh-pages:gh-pages
