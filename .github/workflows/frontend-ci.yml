name: Frontend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  workflow_dispatch: {}

concurrency:
  group: healtharchive-frontend-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  contract-sync:
    name: Frontend CI / contract-sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify generated API contract is current
        run: make contract-check

  lint-and-test:
    name: Frontend CI / lint-and-test
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8001
      NEXT_PUBLIC_SHOW_API_HEALTH_BANNER: "false"
      NEXT_PUBLIC_LOG_API_HEALTH_FAILURE: "false"
      NEXT_PUBLIC_SHOW_API_BASE_HINT: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Check
        run: make frontend-ci

  docker-build-smoke:
    name: Frontend CI / docker-build-smoke
    runs-on: ubuntu-latest
    needs:
      - contract-sync
      - lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build production image
        run: docker build -t healtharchive-frontend:ci frontend
